title: Folia de Reis dos Ferreira
locale: pt-BR
domain: foliadereisdosferreiras.com.br
url: https://foliadereisdosferreiras.com.br
baseurl: ""
logo: /assets/images/logo-folia-topo-site.svg
og_image: /assets/images/logo-folia.png
email: anthony.physis@gmail.com
tagline: "Terno de Reis da Família Ferreira - Januária, MG | Desde 1952"
description: >-
  Folia de Reis da Família Ferreira, tradição desde 1952 no distrito de São Joaquim,
  Januária, Minas Gerais. Conheça a história, os imperadores, cantos e tabelas
  do nosso terno de Reis.
github_username: anthonylgf
minimal_mistakes_skin: neon
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-seo-tag
  - jemoji
  - jekyll-include-cache

author:
  name   : "Folia dos Ferreira"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Terno de Folia de Reis da Família Ferreira, tradição desde 1952 em São Joaquim, Januária - MG."
  links:
    - label: "Youtube"
      icon: "fa-brands fa-square-youtube"
      url: "https://www.youtube.com/@FOLIADOSFERREIRA"
    - label: "Facebook"
      icon: "fa-brands fa-square-facebook"
      url: "https://www.facebook.com/people/Folia-de-reis-dos-Ferreira-Januária-MG/100080397293890/?sk=reels_tab"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/foliadosferreira/"
    - label: "Github"
      icon: "fa-brands fa-square-github"
      url: "https://github.com/anthonylgf/folia-dos-ferreira"

footer:
  links:
    - label: "Youtube"
      icon: "fa-brands fa-square-youtube"
      url: "https://www.youtube.com/@FOLIADOSFERREIRA"
    - label: "Facebook"
      icon: "fa-brands fa-square-facebook"
      url: "https://www.facebook.com/people/Folia-de-reis-dos-Ferreira-Januária-MG/100080397293890/?sk=reels_tab"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/foliadosferreira/"
    - label: "Github"
      icon: "fa-brands fa-square-github"
      url: "https://github.com/anthonylgf/folia-dos-ferreira"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
