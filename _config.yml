title: Folia dos Ferreira
locale: pt-BR
domain: anthonylgf.github.io
url: http://anthonylgf.github.io/folia-dos-ferreira/
baseurl: /folia-dos-ferreira
logo: /assets/images/logo-folia-topo-site.svg
email: anthony.physis@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Site com pequenas informações sobre o terno de Reis da Família Ferreira,
  localizada no distrito de São Joaquim, na cidade de Januária, Minas Gerais.
twitter_username: username
github_username: anthonylgf
minimal_mistakes_skin: neon
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Folia dos Ferreira"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "My awesome biography constrained to a sentence or two goes here."
  links:
    - label: "Youtube"
      icon: "fa-brands fa-square-youtube"
      url: "https://www.youtube.com/@FOLIADOSFERREIRA"
    - label: "Facebook"
      icon: "fa-brands fa-square-facebook"
      url: "https://www.facebook.com/people/Folia-de-reis-dos-Ferreira-Januária-MG/100080397293890/?sk=reels_tab"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/foliadosferreira/"
    - label: "Github"
      icon: "fa-brands fa-square-github"
      url: "https://github.com/anthonylgf/folia-dos-ferreira"

footer:
  links:
    - label: "Youtube"
      icon: "fa-brands fa-square-youtube"
      url: "https://www.youtube.com/@FOLIADOSFERREIRA"
    - label: "Facebook"
      icon: "fa-brands fa-square-facebook"
      url: "https://www.facebook.com/people/Folia-de-reis-dos-Ferreira-Januária-MG/100080397293890/?sk=reels_tab"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/foliadosferreira/"
    - label: "Github"
      icon: "fa-brands fa-square-github"
      url: "https://github.com/anthonylgf/folia-dos-ferreira"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
