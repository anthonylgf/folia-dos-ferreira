name: Testes Integrados

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  test:
    name: Build e Validação do Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0

      - name: Build do Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: test

      - name: Validar HTML e links internos (html-proofer)
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^#/" \
            --ignore-files "/_site/404.html" \
            --checks "Links,Images,Scripts,OpenGraph"
